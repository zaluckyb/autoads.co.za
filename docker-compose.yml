
services:
  payload:
    image: node:20-alpine
    ports:
      - '3003:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
      - ${UPLOADS_HOST_DIR:-/srv/autoads/uploads}:/home/node/app/srv/autoads/uploads
    working_dir: /home/node/app/
    command: sh -c "yarn install && yarn dev"
    env_file:
      - .env

volumes:
  node_modules:
